<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>Tradutor ao Vivo</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Estado do tradutor">
        <div>
          <p class="eyebrow">Sala de aula</p>
          <h1>Tradutor ao Vivo</h1>
        </div>
        <div class="status-pill" id="statusPill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Pronto</span>
        </div>
      </section>

      <section class="control-panel" aria-label="Controles do tradutor">
        <label class="field">
          <span>Idioma de saída</span>
          <select id="targetLanguage">
            <option value="pt-BR" selected>Português (Brasil)</option>
            <option value="es">Espanhol</option>
            <option value="en">Inglês</option>
            <option value="fr">Francês</option>
            <option value="ar">Árabe</option>
            <option value="uk">Ucraniano</option>
            <option value="ru">Russo</option>
            <option value="fa">Persa</option>
            <option value="tr">Turco</option>
            <option value="de">Alemão</option>
            <option value="it">Italiano</option>
            <option value="zh-Hans">Chinês simplificado</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="vi">Vietnamita</option>
            <option value="pl">Polonês</option>
            <option value="ja">Japonês</option>
            <option value="ko">Coreano</option>
          </select>
        </label>

        <label class="toggle-row">
          <input id="echoTarget" type="checkbox" checked />
          <span>Repetir quando a fala já estiver no idioma de saída</span>
        </label>

        <div class="actions">
          <button class="primary-action" id="startButton" type="button">
            <span class="play-symbol" aria-hidden="true"></span>
            Iniciar tradução
          </button>
          <button class="secondary-action" id="stopButton" type="button" disabled>
            <span class="stop-symbol" aria-hidden="true"></span>
            Parar
          </button>
        </div>

        <div class="meter-wrap" aria-label="Volume captado pelo microfone">
          <div class="meter-label">
            <span>Microfone</span>
            <span id="micLabel">aguardando</span>
          </div>
          <div class="meter-track">
            <div class="meter-fill" id="meterFill"></div>
          </div>
        </div>

        <label class="field compact-field">
          <span>Volume da tradução</span>
          <input id="outputVolume" type="range" min="0" max="1" step="0.01" value="0.92" />
        </label>
      </section>

      <section class="transcripts" aria-label="Transcrição">
        <article class="transcript-panel">
          <div class="panel-header">
            <h2>Entrada</h2>
            <span id="inputLanguage">auto</span>
          </div>
          <p id="inputTranscript">A fala detectada aparece aqui.</p>
        </article>
        <article class="transcript-panel">
          <div class="panel-header">
            <h2>Tradução</h2>
            <span id="outputLanguage">pt-BR</span>
          </div>
          <p id="outputTranscript">O texto traduzido aparece aqui.</p>
        </article>
      </section>

      <p class="session-note" id="sessionNote" role="status" aria-live="polite">
        Bluetooth usa a saída de áudio do próprio celular.
      </p>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
